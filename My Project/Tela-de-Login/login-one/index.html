<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guilherme Emanuel | Login</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>

<div class="container">

    <section class="auth-card">

        <div class="brand-area">

            <div class="brand-icon">
                <i class="fas fa-terminal"></i>
            </div>

            <h1>Guilherme Emanuel</h1>

            <p class="brand-description">
                Desenvolvedor Front-End focado em interfaces modernas,
                performance e experiências digitais premium.
            </p>

        </div>

        <form class="auth-form" id="loginForm">

            <h2>Acessar Painel</h2>

            <p class="form-subtitle">
                Faça login para continuar.
            </p>

            <div class="field">

                <label for="email">
                    <i class="fas fa-envelope"></i>
                    E-mail
                </label>

                <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
                required>

                <span class="field-line"></span>

            </div>

            <div class="field">

                <label for="password">
                    <i class="fas fa-lock"></i>
                    Senha
                </label>

                <input
                type="password"
                id="password"
                placeholder="Digite sua senha"
                required>

                <span class="field-line"></span>

                <button
                type="button"
                class="show-password"
                id="togglePassword">

                    <i class="fas fa-eye"></i>

                </button>

            </div>

            <div class="login-options">

                <label class="remember-me">

                    <input type="checkbox">

                    <span>Manter conectado</span>

                </label>

                <a href="#" class="recover-link">
                    Recuperar acesso
                </a>

            </div>

            <button type="submit" class="access-button">

                <i class="fas fa-arrow-right"></i>

                Entrar

            </button>

            <div class="separator">

                <span>ou</span>

            </div>

            <p class="signup-text">

                Ainda não possui acesso?

                <a href="#">
                    Criar Conta
                </a>

            </p>

        </form>

        <footer class="card-footer">

            <p>
                © 2026 Guilherme Emanuel
            </p>

            <div class="footer-links">

                <a href="#">
                    <i class="fab fa-github"></i>
                </a>

                <a href="#">
                    <i class="fab fa-linkedin"></i>
                </a>

                <a href="#">
                    <i class="fab fa-instagram"></i>
                </a>

            </div>

        </footer>

    </section>

</div>

<script src="js/script.js"></script>

</body>
</html>
